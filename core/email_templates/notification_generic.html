<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{ subject }}</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f5f7; font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f5f7; padding:32px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:8px; overflow:hidden;">
          <tr>
            <td style="background-color:#3B82F6; padding:24px 32px;">
              <span style="color:#ffffff; font-size:18px; font-weight:600;">{{ app_name }}</span>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;">
              <h1 style="margin:0 0 16px; font-size:20px; color:#111827;">{{ subject }}</h1>
              {% if recipient_name %}
              <p style="margin:0 0 16px; font-size:14px; line-height:1.6; color:#374151;">
                Hi {{ recipient_name }},
              </p>
              {% endif %}
              <p style="margin:0; font-size:14px; line-height:1.6; color:#374151; white-space:pre-line;">{{ message }}</p>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 32px; background-color:#F9FAFB; border-top:1px solid #E5E7EB;">
              <p style="margin:0; font-size:12px; color:#9CA3AF;">
                This is an automated message from {{ app_name }}. Please do not reply to this email.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
